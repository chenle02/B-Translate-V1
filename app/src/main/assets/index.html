<!doctype html>
<html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1,maximum-scale=1'><title>B-Translate V1</title>
<style>*{box-sizing:border-box}body{margin:0;background:#07131e;color:#eff8ff;font-family:system-ui;overflow:hidden}.app{height:100vh;display:flex;flex-direction:column;background:radial-gradient(circle at top,#174569,#07131e 45%,#04070c)}.top{display:flex;align-items:center;gap:10px;padding:12px}.logo{width:44px;height:44px;border-radius:16px;background:linear-gradient(135deg,#0b84ff,#50ff9d);display:grid;place-items:center;font-size:24px;font-weight:900}h1{font-size:22px;margin:0}.sub{font-size:12px;color:#a8c7d9}.spacer{flex:1}.btn{border:0;border-radius:999px;background:rgba(255,255,255,.14);color:white;font-weight:800;padding:10px 12px;margin:3px}.primary{background:#0b84ff}.good{background:#14a46d}.star{background:#f59e0b}.danger{background:#d64242}.panel{margin:0 12px 10px;border:1px solid rgba(255,255,255,.14);border-radius:22px;background:rgba(255,255,255,.08);padding:12px}.row{display:flex;gap:8px;align-items:center}select,input,textarea{width:100%;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);border-radius:14px;color:white;padding:10px;outline:0;font-size:15px}select option{color:black}textarea{min-height:120px;resize:none;line-height:1.45}.main{flex:1;min-height:0;overflow:auto;padding-bottom:86px}.result{min-height:110px;white-space:pre-wrap;line-height:1.45;color:#eff8ff}.small{font-size:12px;color:#a8c7d9;margin-top:6px}.actions{position:fixed;left:10px;right:10px;bottom:10px;display:flex;gap:6px;overflow-x:auto}.actions button{white-space:nowrap}.history{display:flex;flex-direction:column;gap:8px}.card{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.13);border-radius:16px;padding:10px}.card b{display:block;margin-bottom:4px}.card small{display:block;color:#a8c7d9}@media(max-width:700px){.row{display:block}.top h1{font-size:20px}.btn{padding:9px 10px}textarea{min-height:105px}}</style></head>
<body><div class='app'><div class='top'><div class='logo'>T</div><div><h1>B-Translate V1</h1><div class='sub'>Global translator with real online fallback</div></div><div class='spacer'></div><button class='btn' onclick='openBNotes()'>📝 B-Notes</button><button class='btn' onclick='openBMap()'>🗺️ B-Map</button></div><div class='main'><div class='panel'><div class='row'><select id='from'></select><button class='btn' onclick='swapLangs()'>⇄</button><select id='to'></select></div><div class='small'>Auto detect → target language. Internet is required for real translation.</div></div><div class='panel'><textarea id='input' placeholder='Type text to translate...'></textarea><div class='row' style='margin-top:8px'><button class='btn primary' onclick='translateNow()'>Translate</button><button class='btn' onclick='openGoogle()'>Open Google Translate</button><button class='btn' onclick='clearText()'>Clear</button></div></div><div class='panel'><b>Result</b><div id='result' class='result'>Translation will appear here.</div><div class='small' id='status'>Ready.</div></div><div class='panel'><b>Favorites</b><div id='favorites' class='history'></div></div><div class='panel'><b>History</b><div id='history' class='history'></div></div></div><div class='actions'><button class='btn primary' onclick='translateNow()'>Translate</button><button class='btn good' onclick='copyResult()'>Copy</button><button class='btn star' onclick='favoriteCurrent()'>★ Favorite</button><button class='btn' onclick='swapLangs()'>Swap</button><button class='btn danger' onclick='clearHistory()'>Clear History</button></div></div>
<script>
const LANGS=[['auto','Auto detect'],['af','Afrikaans'],['sq','Albanian'],['am','Amharic'],['ar','Arabic'],['hy','Armenian'],['az','Azerbaijani'],['eu','Basque'],['be','Belarusian'],['bn','Bengali'],['bs','Bosnian'],['bg','Bulgarian'],['ca','Catalan'],['ceb','Cebuano'],['zh-CN','Chinese Simplified'],['zh-TW','Chinese Traditional'],['hr','Croatian'],['cs','Czech'],['da','Danish'],['nl','Dutch'],['en','English'],['eo','Esperanto'],['et','Estonian'],['fil','Filipino'],['fi','Finnish'],['fr','French'],['gl','Galician'],['ka','Georgian'],['de','German'],['el','Greek'],['gu','Gujarati'],['ht','Haitian Creole'],['ha','Hausa'],['haw','Hawaiian'],['he','Hebrew'],['hi','Hindi'],['hmn','Hmong'],['hu','Hungarian'],['is','Icelandic'],['ig','Igbo'],['id','Indonesian'],['ga','Irish'],['it','Italian'],['ja','Japanese'],['jv','Javanese'],['kn','Kannada'],['kk','Kazakh'],['km','Khmer'],['ko','Korean'],['ku','Kurdish'],['ky','Kyrgyz'],['lo','Lao'],['la','Latin'],['lv','Latvian'],['lt','Lithuanian'],['mk','Macedonian'],['mg','Malagasy'],['ms','Malay'],['ml','Malayalam'],['mt','Maltese'],['mi','Maori'],['mr','Marathi'],['mn','Mongolian'],['my','Myanmar Burmese'],['ne','Nepali'],['no','Norwegian'],['ny','Nyanja'],['or','Odia'],['ps','Pashto'],['fa','Persian'],['pl','Polish'],['pt','Portuguese'],['pa','Punjabi'],['ro','Romanian'],['ru','Russian'],['sm','Samoan'],['gd','Scots Gaelic'],['sr','Serbian'],['st','Sesotho'],['sn','Shona'],['sd','Sindhi'],['si','Sinhala'],['sk','Slovak'],['sl','Slovenian'],['so','Somali'],['es','Spanish'],['su','Sundanese'],['sw','Swahili'],['sv','Swedish'],['tg','Tajik'],['ta','Tamil'],['te','Telugu'],['th','Thai'],['tr','Turkish'],['uk','Ukrainian'],['ur','Urdu'],['ug','Uyghur'],['uz','Uzbek'],['vi','Vietnamese'],['cy','Welsh'],['xh','Xhosa'],['yi','Yiddish'],['yo','Yoruba'],['zu','Zulu']];
let historyItems=JSON.parse(localStorage.getItem('btranslate_history')||'[]');let favoriteItems=JSON.parse(localStorage.getItem('btranslate_favorites')||'[]');let current=null;
function fillLangs(){let f=document.getElementById('from'),t=document.getElementById('to');LANGS.forEach(([c,n])=>{let a=document.createElement('option');a.value=c;a.textContent=n;f.appendChild(a);if(c!=='auto'){let b=document.createElement('option');b.value=c;b.textContent=n;t.appendChild(b)}});f.value=localStorage.getItem('btranslate_from')||'auto';t.value=localStorage.getItem('btranslate_to')||'zh-CN';f.onchange=()=>localStorage.setItem('btranslate_from',f.value);t.onchange=()=>localStorage.setItem('btranslate_to',t.value)}
function esc(s){return String(s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]))}function status(s){document.getElementById('status').textContent=s}function getText(){return document.getElementById('input').value.trim()}
async function translateNow(){let text=getText();if(!text){status('Type something first.');return}let sl=document.getElementById('from').value,tl=document.getElementById('to').value;if(sl===tl){document.getElementById('result').textContent=text;status('Same language.');return}status('Translating online...');try{let url='https://translate.googleapis.com/translate_a/single?client=gtx&sl='+encodeURIComponent(sl)+'&tl='+encodeURIComponent(tl)+'&dt=t&q='+encodeURIComponent(text);let r=await fetch(url);if(!r.ok)throw Error('network');let data=await r.json();let translated=(data[0]||[]).map(x=>x[0]).join('');if(!translated)throw Error('empty');document.getElementById('result').textContent=translated;current={from:sl,to:tl,input:text,result:translated,time:new Date().toISOString()};historyItems.unshift(current);historyItems=historyItems.slice(0,50);localStorage.setItem('btranslate_history',JSON.stringify(historyItems));renderHistory();status('Translated.')}catch(e){status('Direct translation failed. Opening Google Translate fallback...');openGoogle()}}
function openGoogle(){let text=getText();if(!text){status('Type something first.');return}let sl=document.getElementById('from').value,tl=document.getElementById('to').value;if(window.AndroidBridge)AndroidBridge.openGoogleTranslate(sl,tl,text);else window.open('https://translate.google.com/?sl='+encodeURIComponent(sl)+'&tl='+encodeURIComponent(tl)+'&text='+encodeURIComponent(text)+'&op=translate')}
function swapLangs(){let f=document.getElementById('from'),t=document.getElementById('to');if(f.value==='auto')f.value='en';let a=f.value;f.value=t.value;t.value=a;localStorage.setItem('btranslate_from',f.value);localStorage.setItem('btranslate_to',t.value)}function copyResult(){let r=document.getElementById('result').textContent;navigator.clipboard?.writeText(r).then(()=>status('Copied.'),()=>status('Copy failed.'))}function favoriteCurrent(){if(!current){status('Translate something first.');return}favoriteItems.unshift(current);favoriteItems=favoriteItems.slice(0,50);localStorage.setItem('btranslate_favorites',JSON.stringify(favoriteItems));renderFavorites();status('Added to favorites.')}
function renderList(id,items){let el=document.getElementById(id);el.innerHTML='';if(!items.length){el.innerHTML='<div class=small>Empty.</div>';return}items.slice(0,20).forEach(it=>{let d=document.createElement('div');d.className='card';d.innerHTML='<b>'+esc(it.input)+'</b><div>'+esc(it.result)+'</div><small>'+esc(it.from)+' → '+esc(it.to)+'</small>';d.onclick=()=>{document.getElementById('input').value=it.input;document.getElementById('result').textContent=it.result;document.getElementById('from').value=it.from;document.getElementById('to').value=it.to;current=it};el.appendChild(d)})}function renderHistory(){renderList('history',historyItems)}function renderFavorites(){renderList('favorites',favoriteItems)}function clearHistory(){historyItems=[];localStorage.removeItem('btranslate_history');renderHistory();status('History cleared.')}function clearText(){document.getElementById('input').value='';document.getElementById('result').textContent='Translation will appear here.';status('Cleared.')}function openBMap(){if(window.AndroidBridge)AndroidBridge.openApp('com.chenboda01.bmapv2osflow96','com.chenboda01.bmapv2osflow96.MainActivity','B-Map V1')}function openBNotes(){if(window.AndroidBridge)AndroidBridge.openApp('com.chenboda01.bnotesv1','com.chenboda01.bnotesv1.MainActivity','B-Notes V1')}window.btranslateBack=function(){status('Saved locally.')};fillLangs();renderHistory();renderFavorites();
</script></body></html>
